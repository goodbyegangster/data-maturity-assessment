      4: "注目度の高い分野において、どのようなデータ処理を自動化できるか、また自動化すべきかを十分に理解しており、組織全体でこれを一貫して適用し始めている。長期的に見て、効率性と品質を達成するために、どのような自動化が有益で適切なのかを検討しているが、ある程度の一貫性は保っている。"
      5: "データ処理の自動化が可能かどうか、また自動化すべきかどうかを明確に理解している。効率性と品質を実現するために、長期的に見てどのような自動化が有益で適切かを慎重に検討する。"

