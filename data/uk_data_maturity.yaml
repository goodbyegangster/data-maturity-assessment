      3: "最も重要なデータ処理をテストし、文書化し、ほとんどの場合、同じ出力を効率的に再現できる。テストは様々なデータシナリオをカバーしている。プロセスの文書化は散発的で、後期段階で行われる場合もある。伝達が不十分であったり、アクセスできない場合もある。アプローチは組織全体で非常に一貫性がない。"
