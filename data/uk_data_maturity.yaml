title: "英国政府 Data Maturity Assessment"

model: "uk"

modelId: 1

modelDescription: |-
  - このフレームワークは、政府向けデータ成熟度評価の出発点となるものです。自己評価フレームワークであり、10のトピックを中心に構成され、6つのテーマと交差しながら行ごとに配置されています。各行には5つの成熟度レベルが設定されています。評価は、証拠や情報を収集して実施され、それをもとに組織の各行における現在の成熟度レベルを判定します。
  - > This framework is the starting point for the Data Maturity Assessment for Government. It is a self-assessment framework and is organised around 10 topics, intersected with six themes, arranged across rows, with each row providing 5 maturity levels. An assessment is carried out by gathering evidence and information which is used to determine an organisation’s current maturity level for each row.
  - [Data maturity assessment for government: framework](https://www.gov.uk/government/publications/data-maturity-assessment-for-government-framework)

maturityLevels:
  - level: 1
    name: "初級"
    description: |-
      - 最低限の法的要件の遵守。
      - 偏狭なアプローチとサイロ化した作業。
      - 組織がデータを成果にとって価値あるものと見なしていない。
      - データに対する責任と監視が明確でない。
      - 組織がどのようなデータを保有しているかについての知識が極めて乏しい。
      - データリテラシーが極めて低い。
      - 意図的ではなくデフォルトで制限や制約がある。

  - level: 2
    name: "初期段階"
    description: |-
      - データは利用されているが、優先事項ではない。
      - データをITまたは管理部門の責任とみなしている。
      - データの利用やアクセスが専門スタッフに限られている。
      - 組織が保有するデータの価値についての認識が欠如している。
      - データの所有権と責任の所在がよく伝わっていない。
      - ビジネスリーダーシップとデータリーダーシップの間に断絶がある。
      - 注目度の高いプロセスやアウトプットにのみ焦点が当てられている。

  - level: 3
    name: "学習"
    description: |-
      - データおよび分析リテラシーがリーダーシップ層に評価されている。
      - 法的・政策的要件がしっかりと組み込まれ、広く理解されている。
      - 上級戦略リーダーがデータの重要性を理解している。
      - スタッフのデータへの関与が、ITまたは管理部門のみにとどまらない。
      - 専門でないスタッフがデータを扱うには、専門家からのサポートが必要。
      - データ能力の向上に対する幅広い意欲と願望がある。
      - サイロの意図的な破壊。

  - level: 4
    name: "応用学習中"
    description: |-
      - 組織全体に方針と慣行を定着させ始めている。
      - 専門家以外のデータ利用者は、専門家のサポートにほとんど、あるいは全く依存していない。
      - 外部への働きかけや関与がある。
      - 方針や慣行の定期的な見直し。
      - データが一貫して優先事項とみなされている。
      - 全スタッフのデータへの関与度が高い。
      - 深い能力。
      - 組織全体での実践に一貫性がない場合がある。

  - level: 5
    name: "熟練"
    description: |-
      - 模範とされる。
      - 常に積極的である。
      - 組織全体で実施している。
      - 強力な社内外の関与を行う。
      - ニーズの明確な理解と適切な対応をする。
      - 将来への備えと将来のニーズを予測する。
      - 幅広く深い能力がある。

themeAreas:
  - theme: "利用"
    description: |-
      - データから価値を引き出す方法。
      - 意思決定、影響の証明、サービスの改善。

  - theme: "データ"
    description: |-
      - データ管理の技術的な側面。
      - 資産、コレクション、品質、相互運用性。

  - theme: "リーダーシップ"
    description: |-
      - 上級、戦略、ビジネスの各リーダーからのデータ活用の推進。
      - 戦略、責任、監督、投資。

  - theme: "文化"
    description: |-
      - 組織全体のデータに対する姿勢。
      - 認識、オープン性、安全性、責任。

  - theme: "ツール"
    description: |-
      - データを保存、共有、使用するためのシステムとツール。

  - theme: "スキル"
    description: |-
      - 組織全体のデータと分析リテラシー。
      - 開発機会の提供。

topicAreas:
  - topic: "他者との連携"
    summary: "データエコシステムにおける他者との連携"
    concept: |-
      - ユーザーのニーズを理解する
      - コラボレーション
      - データ共有
      - ネットワークと実践コミュニティ
    scopeTheme: ["文化", "スキル"]

  - topic: "適切なデータスキルと知識"
    summary: "組織に必要なデータと分析のリテラシー"
    concept: |-
      - スタッフのデータリテラシー
      - リーダーシップの役割におけるデータスキル
      - 専門データスタッフの育成
      - データスキル開発機会の提供
    scopeTheme: ["利用", "データ", "リーダーシップ", "文化", "スキル"]

  - topic: "適切なシステム"
    summary: "適切なシステムを持つこと"
    concept: |-
      - インフラストラクチャー
      - ストレージ
      - ツール/テクノロジー
      - データ システムとツールへの投資
    scopeTheme: ["リーダーシップ", "ツール"]

  - topic: "保有データの把握"
    summary: "保有するデータを記録し、カタログ化し、保存する方法"
    concept: |-
      - 資産台帳/データカタログ
      - データの廃棄
      - メタデータ
    scopeTheme: ["データ"]

  - topic: "データに基づいた意思決定"
    summary: "データを活用して作業を改善"
    concept: |-
      - データに基づいた運用および戦略的な意思決定
      - ユーザーを理解する
      - パフォーマンスを監視する
    scopeTheme: ["利用", "リーダーシップ"]

  - topic: "倫理的なデータ管理と利用"
    summary: "データの計画と使用にデータ倫理をどの程度取り入れているか"
    concept: |-
      - 透明性
      - バイアスの緩和
      - 包括性
      - 監視と監視
    scopeTheme: ["データ", "リーダーシップ", "文化", "ツール", "スキル"]

  - topic: "データ管理"
    summary: "データをどのように管理して、その使いやすさを確保するか"
    concept: |-
      - データ標準
      - データの品質
      - データ収集
      - データ パイプライン
      - データの廃棄
    scopeTheme: ["データ", "リーダーシップ", "文化", "スキル"]

  - topic: "データ保護"
    summary: "ITシステム、スキル、ポリシーによってデータがどの程度安全に保たれているか"
    concept: |-
      - データセキュリティ
      - データ保護
      - 災害復旧
    scopeTheme: ["データ", "文化", "ツール"]

  - topic: "データ戦略の設定"
    summary: "組織内のポリシー、戦略、原則、そしてそれらが組織にどの程度浸透しているかデータの価値を理解しているか"
    concept: |-
      - データの原則
      - データポリシー
      - データ戦略
    scopeTheme: ["利用", "データ", "リーダーシップ", "文化"]

  - topic: "データに関する責任"
    summary: "組織内にデー​​タに責任を持つ人がいることを確認する"
    concept: |-
      - ガバナンス
      - 責任と説明責任の構造
      - 資産とプロセスの所有権
      - ポリシーと手順の遵守の監視
    scopeTheme: ["データ", "リーダーシップ", "文化", "ツール", "スキル"]

assessments:
  - id: 1
    topic: "他者との連携"
    summary: "必要な人にデータを提供できるようにする。"
    theme: "文化"
    levels:
      1: "データはデフォルトで、専門家1人または1チームのみが利用できるようにする。組織内でのデータ共有は推奨しない。"
      2: "組織内で口頭またはレポートを通じてデータを共有し始めている。チーム間でのデータ共有を促進したり、データを直接共有する方法を提供したりしない。"
      3: "専門ユーザーが組織内の一部のデータにアクセスし、共有できるようにするが、システムまたはプロセスは、設計ではなくデフォルトでデータへのアクセスと共有を制限している。一部の組織内ユーザーは必要なデータに適切にアクセスできるが、データにアクセスまたは共有するには専門家のサポートが必要になる場合がある。"
      4: "データに直接アクセスし、共有する方法を提供し始めているが、専門知識のないスタッフがこれを行うには、専門家の介入が必要になる場合がある。すべての組織内ユーザーと一部の組織外ユーザーは、必要なときに必要なデータに適切にアクセスできる。"
      5: "データは、必要なすべてのユーザーが適切にアクセスし、直接共有できる。組織内外のすべてのユーザーは、専門家のサポートなしに、必要なときに必要なデータにアクセスできる。"

  - id: 2
    topic: "他者との連携"
    summary: "ステークホルダーや顧客とデータを共有する。"
    theme: "文化"
    levels:
      1: "データは、法的、契約上、またはコンプライアンス報告の目的でのみ外部と共有される。"
      2: "データをより効果的に共有し、公開する方法を模索し始めている。オープン性とセキュリティのトレードオフを認識している。"
      3: "可能な限り、定期的に顧客とデータを共有する。また、必要に応じて、洞察と証拠を公開する。"
      4: "サービス提供の一環として、データをクライアントと個別に共有する方法を検討する。"
      5: "組織内外で広範な知識とスキルの共有を実施する。組織内外の様々なチーム、部門、サービス間でデータを共有する。"

  - id: 3
    topic: "他者との連携"
    summary: "データに変更を加える際には、ユーザーのニーズを考慮する。"
    theme: "文化"
    levels:
      1: "ユーザーへの影響を考慮せずにデータに変更を加える。データの変更は、法的要件またはポリシー要件によって外部から義務付けられている場合にのみ伝達する。"
      2: "ユーザーのニーズや、変更がユーザーに及ぼす影響を考慮せずにデータに変更を加える。注目度の高いデータの変更を伝達する。伝達のアプローチと形式が一貫していない。"
      3: "データに変更を加える際は、影響力の大きいユーザーのニーズを考慮する。重要なデータへの変更は、一貫性と明確さをもって伝達する。"
      4: "変更を行う際には、データ利用者および再利用者のニーズを理解するために、彼らに配慮し、協議する。データの変更は明確に伝達するが、そのアプローチや形式は組織全体で多少一貫性がない。"
      5: "データのほとんどのユーザーと再利用者のニーズを包括的に理解している。データに変更を加える際には、重要なユーザーのニーズが満たされるよう、常に最大限の努力を払う。すべての変更は、明確かつ一貫して伝達される。"

  - id: 4
    topic: "他者との連携"
    summary: "戦略の一環としてデータを共有する。"
    theme: "文化"
    levels:
      1: "データ共有を管理業務とみなしている。上級管理職は、データ共有の成功に対する責任や説明責任を負っていない。"
      2: "データ共有を戦略ではなく、主にタスクとして捉えている。組織内の一部の部門では、データ共有に対してよりオープンになり始めている。"
      3: "データ共有をタスクではなく戦略として捉え、よりオープンな姿勢でデータ共有に取り組んでいる。"
      4: "限定的なデータ共有を戦略的優先事項として捉え始めている。データ共有を成功させるための責任と説明責任の構造を定義し始めている。"
      5: "データ共有を戦略的優先事項に含める。上級管理職は、データ共有を確実に成功させる責任と説明責任を負う。これらの体制は、一貫して実施され、伝達される。"

  - id: 5
    topic: "他者との連携"
    summary: "間違いについて話し合い、そこから学ぶ。"
    theme: "文化"
    levels:
      1: "スタッフまたはチームは、データの問題を個別に解決する。データに関する問題についてオープンに議論するための手段やフォーラムを奨励していない。過去の失敗から学んだ教訓を記録したり、共有したりしていない。"
      2: "オープンで失敗から学ぶ文化を築き始めている。学んだ教訓を臨機応変に伝える努力をしている。"
      3: "過去の失敗から得た教訓をデータに基づいて率直に議論し、それを一貫して伝える。これは主に、インシデント発生後の対応として行われる。"
      4: "データについて、事後対応ではなく、オープンに議論し、データの問題から定期的に学ぶ。様々なチームや役職レベルの人々が、データの問題とその対処方法について定期的に話し合いる。学んだ教訓を広く伝えるよう努めますが、組織内のすべての関連部門に伝わるとは限らない。"
      5: "あらゆるレベルで、データに関する問題について積極的かつ定期的に議論を促進する。必要に応じて、組織内外で得られた教訓を共有する。既知のデータの問題とそこから得られた教訓を組織全体に効果的に伝達する。"

  - id: 6
    topic: "他者との連携"
    summary: "組織内のデータユーザーと協力し、彼らのニーズを満たす。"
    theme: "文化"
    levels:
      1: "組織のデータを利用する組織内のユーザーと時々交流し、ニーズに関するフィードバックを得る。外部からの指示がない限り、これに基づいて行動することはない。"
      2: "組織のデータを利用する組織内のユーザーと連携し、彼らのニーズを把握する。そして、注目度の高い分野において、このニーズに基づいた取り組みを開始している。"
      3: "幅広い組織内の重要なユーザーとの関係構築を開始し、彼らのニーズを把握する。注目度の高い分野でこれに基づき行動する。"
      4: "データの影響力の大きい組織内ユーザーとの関係を構築・維持し、彼らのニーズを理解する。すべての重要分野およびその他の重要な分野において、これに基づき行動する。このアプローチは組織全体で一貫していない。"
      5: "組織のデータを利用するすべての重要な組織内ユーザーのニーズを明確に理解し、組織内ユーザーのニーズに適切かつ一貫して対応する。"

  - id: 7
    topic: "他者との連携"
    summary: "外部データ利用者と協力し、彼らのニーズを満たす。"
    theme: "文化"
    levels:
      1: "組織のデータの外部ユーザーと時々連携し、ニーズに関するフィードバックを得る。外部からの指示がない限り、これに基づいて行動することはない。"
      2: "組織のデータを利用する外部ユーザーと連携し、彼らのニーズを把握する。注目度の高い分野で、この取り組みに着手する。"
      3: "幅広い影響力を持つ外部ユーザーとの関係構築を開始し、彼らのニーズを把握する。注目度の高い分野のほとんどで、この取り組みを実施する。"
      4: "データの影響力の大きい外部ユーザーおよび最も重要な外部ユーザーとの関係を構築・維持し、彼らのニーズを理解する。すべての重要な分野およびその他の重要な分野でこれに基づき行動する。このアプローチは組織全体で一貫していない。"
      5: "組織のデータを利用するすべての重要な外部ユーザーのニーズを明確に理解し、必要に応じて外部ユーザーのニーズに一貫して対応する。"

  - id: 8
    topic: "他者との連携"
    summary: "サポートチームやネットワークと連携して、データスキルを向上する。"
    theme: "スキル"
    levels:
      1: "スタッフのデータリテラシーを向上するために他者と関わることに、ほとんどあるいはまったく価値を感じない。"
      2: "政府支援チームとネットワークの認知度向上のため、組織内での取り組みを開始しているが、その範囲は高度に専門化された少人数のスタッフグループに限定されている。データを扱う個々のスタッフは、これらのチームと非公式かつ低頻度でしか関わらない可能性がある。"
      3: "当組織は、データリテラシーの向上を目的に、政府の支援チームおよびネットワークと計画的かつ綿密に連携している。連携の頻度は、具体的なニーズに基づいて随時決定される。"
      4: "政府のサポートチームおよびネットワークとの定期的な連携を業務に組み込む。データリテラシーへの継続的な取り組みの一環として、分野の最新動向を常に把握する。"
      5: "他のパートナー、同僚、部門がリソースとして活用できる専門家になる。"

  - id: 9
    topic: "適切なデータスキルと知識"
    summary: "個々のスタッフの仕事におけるデータの重要性を認識する。"
    theme: "文化"
    levels:
      1: "組織全体でデータに対する認識が低い、あるいは全くない。データが自分の仕事とどのように関連しているかを理解しているスタッフはごくわずかである。"
      2: "ほとんどのスタッフは、データが組織の業務の一部であることを認識しているが、それが自分の仕事とどのように関連しているかを認識していない。"
      3: "組織全体の人々がデータについて話し合い始め、それが自分の仕事とどのように関連しているかを理解し始めている。"
      4: "データに関する組織的な取り組みは、データに関する認識の定着を支援するために、組織内の高価値データ管理または分析領域で実施される場合がある。このアプローチは、組織全体で構造化されておらず、一貫性がない場合がある。"
      5: "データに関する組織的な取り組みは、組織の各部門に存在し、組織全体にわたってデータに関する認識の定着を積極的に推進し、維持している。組織は、業務の文脈において、データ知識と研究のネットワークに積極的に参加している。"

  - id: 10
    topic: "適切なデータスキルと知識"
    summary: "データ共有に必要な段取りを理解する。"
    theme: "データ"
    levels:
      1: "プライバシー評価が不適切または誤って適用されたために、間違ったデータを共有したり、データの共有や使用を避けたりする。"
      2: "適切な評価を実施し、適切なデータセットを定期的に共有する。データ共有に関する法的およびセキュリティ上の懸念を理解し、一部のデータについては、ビジネスニーズとプライバシーおよびセキュリティ上の懸念を適切に比較検討し始める。"
      3: "共有可能なデータを特定している。共有されるすべてのデータセットに対して適切な評価とライセンスが整備されている。"
