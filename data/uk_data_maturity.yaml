      4: "新しいシステムとツールの開発全体を通して、リスクとセキュリティ要件を考慮する。システムとデータへのアクセスを監視し、不正使用や攻撃がないか確認する。"
      5: "組織固有のリスクと脅威のパターンに合わせてデータセキュリティツールをカスタマイズする。新しいデータ保存および処理ツールの開発を、データセキュリティツールの改善の機会として活用する。システム、ツール、データへのアクセス権限を定期的に確認する。"

  - id: 82
    topic: "データ保護"
