      5: "すべての重要なデータ処理を最初から積極的に設計、テスト、文書化し、同じ出力で効率的に再現でき、変更に対して耐性があることを保証する。文書化とプロセスは透明性を保ち、適切に伝達され、利用可能である。このアプローチは組織全体で一貫している。"

