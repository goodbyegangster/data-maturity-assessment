    theme: "ツール"
    levels:
      1: "組織がデータの保存および処理のために保有するIT資産に関する情報は最小限しか記録されないか、全く記録されない。記録は通常、組織化または一貫した構造なしに間接的に収集される。IT資産に保存されているデータを保護するための物理的なセキュリティ対策は、最小限の法的要件に従ってのみ検討される。"
      2: "基本的なIT資産台帳は存在するが、ツールの記録方法に関するプロセスは説明されておらず、サポートも監視もされていない。この台帳には、重要資産のみが記録されている。高価値資産に対するセキュリティリスクの一部は特定され、対処されている。リスクと物理的なデータセキュリティ対策の監視とレビューは実施されていない。"
      3: "IT資産を記録するための標準化されたプロセスが整備されている。これらの資産に保存されているデータの価値と機密性は、一貫して記録されていない。既知のすべてのIT資産に対するセキュリティリスクは評価され、対処されている。優先度の高い資産の物理的セキュリティは定期的に見直されているが、実装されているセキュリティは、データの価値や機密性に応じて測定されていない。"
      4: "IT資産を記録するための標準化されたプロセスが組み込まれている。データの価値と機密性は、物理的なIT資産を記録する際の優先事項である。記録されたすべてのIT資産に対する物理的なセキュリティ対策は、定期的に見直され、保有するデータの価値と機密性に紐付けられている。"
      5: "IT資産登録簿は徹底しており、これらの資産の所有権と責任は定義、実装され、透明性が確保されている。物理的なセキュリティ対策は、データのセキュリティを確保するために、積極的にレビューおよびテストされている。"

