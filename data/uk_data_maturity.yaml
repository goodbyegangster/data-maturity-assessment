      4: "上級管理職の担当者またはチームが組織全体のデータを集約する。データと分析スキルの開発は、上級管理職レベルの監督と支援を受ける。"
      5: "上級管理職、専門職、技術職、管理職レベルのスタッフによるデータ分析スキルと分析スキルの開発に高いレベルで取り組む。"

  - id: 97
    topic: "データに関する責任"
    summary: "データツールとシステムの所有権と責任の割り当て。"
    theme: "ツール"
    levels:
      1: "組織が使用または所有するツールに関する最小限の記録を保持する。記録は通常、組織や一貫した構造を持たずに間接的に収集される。ツールの保守と更新に関する責任構造は、設計ではなくデフォルトでのみ構築される。"
      2: "ツールとシステムのインベントリは管理・維持されている。ツールとシステムの所有権と責任は一貫して記録されていない。"
      3: "データと分析ツールに関する正式な責任は確立されているが、組織全体で適切に監視または可視化されていない。スタッフはこれらの構造が自分の仕事とどのように関連しているかを理解していない。"
      4: "すべてのデータの保管、クリーニング、メンテナンス、セキュリティ、バックアップの管理は、正式には人が担当する。可能な場合は、これが日常的に行われ、自動化されるようになっている。"
      5: "すべてのツールの所有権、監督、サポートは文書化されている。ツールの説明責任と責任は組織全体で透明性と可視性を確保している。スタッフはこれらの構造が自分の仕事とどのように関連しているかを理解している。"
