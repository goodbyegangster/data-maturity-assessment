title: "独自 Data Maturity Assessment"

model: "custom"

modelId: 3

modelDescription: |-
  - 英国政府および豪州政府のデータマチュリティモデルを参考に、独自のアセスメントモデルを定義したものです。
  - DAMA-DMBOK で定義される 11 の領域を範囲として、各質問に 6 つのマチュリティレベルで評価基準を提供しています。

maturityLevels:
  - level: 0
    name: "欠如"
    description: |-
      - データ管理に関する取り組みが組織のどの部門においても存在しない
      - データの価値や管理の必要性についての認識がなく、方針・プロセス・ツールが整備されていない

  - level: 1
    name: "初期／場当たり的な状態"
    description: |-
      - データ管理の取り組みが一部の個人や部門で散発的に行われているが、組織的・体系的ではない
      - プロセスは文書化されておらず、担当者の個人スキルや経験に依存している
      - 成果は再現性が低く、問題発生時の対応は事後的・受動的である

  - level: 2
    name: "反復可能な状態"
    description: |-
      - 基本的なデータ管理プロセスが一部の領域で確立され、繰り返し実施できるようになっている
      - プロジェクトや部門単位での取り組みは存在するが、組織全体への展開・標準化には至っていない
      - データ管理の重要性が認識され始め、組織横断的な取り組みへの機運が生まれている

  - level: 3
    name: "定義された状態"
    description: |-
      - データ管理のプロセス・標準・ポリシーが文書化され、組織全体で共有・適用されている
      - データガバナンス体制（役割・責任・意思決定フロー）が明確に定義・運用されている
      - 組織全体で一貫したデータ管理の実践が行われ、部門間の連携が取れている

  - level: 4
    name: "管理された状態"
    description: |-
      - データ管理活動の効果が定量的な指標（KPI・メトリクス）で測定・監視されている
      - データ品質・プロセスパフォーマンスのデータに基づき、問題の早期検知と予防的対応が可能である
      - データ管理の改善活動が定期的なレビューと実績データに基づいて推進されている

  - level: 5
    name: "最適化された状態"
    description: |-
      - データ管理プロセスが継続的改善のサイクルに基づいて進化し続けている
      - 新技術・ベストプラクティスを積極的に取り入れ、組織全体のデータ能力を高めている
      - データ活用が組織の競争優位・イノベーション創出に直結し、戦略的資産として最大限に活かされている

topicAreas:
  - topic: "データガバナンスとスチュワードシップ"
    description: |-
      - 組織全体のデータ管理方針・標準・ルールを定義し、意思決定権限を明確化する
      - データ管理者（データスチュワードなど）の役割と責任を確立する
      - データガバナンス委員会やデータ管理組織などのガバナンス体制を整備する
      - データに関するポリシー遵守状況を監視・評価し、継続的に改善する
      - ビジネス目標に沿ったデータ戦略・ロードマップを策定・維持する
      - データ倫理の原則を定め、適切かつ透明性の高いデータ利用を統治する

  - topic: "データアーキテクチャー"
    description: |-
      - 組織全体のデータ資産の現状と目標アーキテクチャを定義・文書化する
      - エンタープライズアーキテクチャと連携したデータアーキテクチャフレームワークを構築する
      - データフロー・データストア・システム間連携を俯瞰的に設計・管理する
      - 将来的なビジネスニーズや技術変化に対応できる拡張性・柔軟性のある設計を維持する
      - データアーキテクチャの変更管理プロセスを確立し、整合性を保つ

  - topic: "データモデリングとデザイン"
    description: |-
      - 概念・論理・物理の各レベルでデータモデルを設計・文書化・管理する
      - 組織標準に準拠したデータモデリング規約・命名規則を定義・適用する
      - データモデルのレビュープロセスと変更管理を整備し、品質を担保する
      - ビジネス要件とシステム設計を橋渡しするデータモデルを継続的に改善する
      - データモデルリポジトリを活用して、モデルの一元管理と共有を実現する

  - topic: "データストレージとオペレーション"
    description: |-
      - データの保存・取得・バックアップ・アーカイブに関する方針と手順を整備する
      - データの可用性・パフォーマンス・信頼性を確保するためのインフラを管理する
      - データライフサイクル（保持・廃棄）ポリシーを定義し、コンプライアンスを維持する
      - データベース管理・容量計画・障害復旧手順を標準化・自動化する
      - クラウドおよびオンプレミス環境を含むデータストレージの最適化を継続的に実施する

  - topic: "データセキュリティー"
    description: |-
      - データの機密性・完全性・可用性を保護するためのセキュリティポリシーを策定・実施する
      - データアクセス制御（認証・認可・最小権限の原則）を設計・管理する
      - 個人情報保護法・各種規制への準拠を確保し、定期的な監査を実施する
      - データの分類（公開・内部・機密・極秘）に基づいたセキュリティ対策を適用する
      - データ漏洩・不正アクセスの検知・対応手順を整備し、インシデント管理を行う

  - topic: "データ統合と相互運用性"
    description: |-
      - システム間・組織間でのデータ連携・交換の方式とプロセスを標準化する
      - ETL/ELT・API・メッセージングなどのデータ統合パターンを設計・管理する
      - データ変換・マッピング・クレンジングルールを文書化し、一貫性を確保する
      - データ統合パイプラインの監視・品質チェック・エラー対応の仕組みを整備する
      - オープンスタンダードや共通データフォーマットを活用し、相互運用性を高める

  - topic: "ドキュメントとコンテンツ管理"
    description: |-
      - 構造化・非構造化データを含むドキュメントとコンテンツの管理方針を策定する
      - コンテンツのライフサイクル（作成・保管・検索・廃棄）を管理するプロセスを確立する
      - 文書管理システム（DMS）やコンテンツ管理システム（CMS）を活用し、一元管理を実現する
      - ドキュメントの版管理・アクセス制御・保持期限を適切に設定・運用する
      - 規制要件・法的要件に対応したレコード管理（Records Management）を実施する

  - topic: "参照データとマスターデータ管理"
    description: |-
      - 組織全体で共有すべきマスターデータ（顧客・製品・組織など）を特定・定義する
      - マスターデータの単一の真実源（Single Source of Truth）を確立し、一貫性を保つ
      - 参照データ（コード値・分類体系など）の標準を定義・維持・配布する
      - マスターデータ管理（MDM）プラットフォームを活用し、重複排除・名寄せを実施する
      - マスターデータの変更管理・品質監視プロセスを整備し、データの正確性を維持する

  - topic: "データウェアハウジングとビジネスインテリジェンス"
    description: |-
      - 意思決定支援のためのデータウェアハウス・データマート・データレイクを設計・構築する
      - BI ツール・ダッシュボード・レポーティング基盤を整備し、セルフサービス分析を実現する
      - データウェアハウスのデータモデル（スタースキーマ等）を標準化・文書化する
      - データのロード・変換・更新プロセス（ETL パイプライン）を安定的に運用・監視する
      - ビジネスニーズに応じた分析・可視化機能を継続的に拡充し、データ活用を促進する

  - topic: "メタデータ管理"
    description: |-
      - ビジネスメタデータ・テクニカルメタデータ・オペレーションメタデータを体系的に収集・管理する
      - データカタログを構築し、データ資産の検索・理解・活用を容易にする
      - ビジネス用語集（Business Glossary）を整備し、組織内の共通言語を確立する
      - データの出所や流れ（データリネージ）を追跡・可視化し、信頼性を担保する
      - メタデータの品質・最新性・一貫性を継続的に監視・改善する仕組みを整備する

  - topic: "データ品質管理"
    description: |-
      - データ品質の評価基準（正確性・完全性・一貫性・適時性・一意性など）を定義する
      - データ品質プロファイリング・測定・監視のプロセスとツールを整備する
      - データ品質問題の根本原因を分析し、是正・予防措置を実施する仕組みを確立する
      - データ品質ルールをデータパイプライン・システムに組み込み、自動チェックを実現する
      - データ品質の状態をステークホルダーに定期的に報告し、改善を継続的に推進する

assessments:
  - id: 1
    topic: "データガバナンスとスチュワードシップ"
    summary: "データの収集・保存・共有・使用に関する構想と優先順位を整理したデータ戦略が策定されている。"
    levels:
      0: "データ戦略は策定されていない。"
      1: "一部の組織においてデータ戦略の策定に取り組んでいる、または策定済みである。"
      2: "一部の組織においてデータ戦略を共有し、実行に移している。"
      3: "組織全体でデータ戦略を共有し、実行している。この戦略は、組織全体や外部関係者との協議を経て策定されている。"
      4: "データ戦略が定着しており、組織全体の行動と意思決定の基盤となっている。"
      5: "データ戦略が定着しており、要求の変化に合わせて定期的に見直しと更新が行われている。"

  - id: 2
    topic: "データガバナンスとスチュワードシップ"
    summary: "データ資産の管理を監督するガバナンス体制が整っている。"
    levels:
      0: "データガバナンスの取り組みは行われていない。"
      1: "一部のデータ資産を対象としたガバナンスの初期対応を行っているが、体制は分断されており、組織全体での状況把握は困難である。"
      2: "主要なデータ資産を監督するガバナンス組織を設置している。他部門への展開は計画または検討段階である。"
      3: "ガバナンス組織は、組織内のほぼすべての部門の代表者で構成されている。"
      4: "ガバナンス組織は全社的な代表者で構成され、経営層の意思決定プロセスに組み込まれている。"
      5: "ガバナンス組織は全社的な代表者で構成され、経営層の意思決定において強力な権限を持ち、積極的に機能している。"

  - id: 3
    topic: "データガバナンスとスチュワードシップ"
    summary: "データ管理者（スチュワードなど）を任命し、データの品質、取り扱い、アクセス、利用に関する役割と責任を明確に定義している。"
    levels:
      0: "データ管理者などの役割や責任は正式に定義されていない。"
      1: "一部のデータ資産に対して、データ管理者が任命されている。"
      2: "主要なデータ資産に対して、データ管理者が任命されている。"
      3: "ほぼすべてのデータ資産にデータ管理者が任命され、その役割と責任が組織全体で理解されている。"
      4: "すべてのデータ資産にデータ管理者が任命され、その役割と責任が組織全体で理解されている。"
      5: "すべてのデータ資産にデータ管理者が任命され、役割と責任が定着している。ルールの遵守状況も積極的に監視・報告されている。"

  - id: 4
    topic: "データガバナンスとスチュワードシップ"
    summary: "データの適切な利用、標準化、ルールの遵守を確実にするため、データ担当者と業務部門が明確に連携している。"
    levels:
      0: "データ担当者と業務部門の間に明確な連携はない。"
      1: "データ担当者と一部の業務部門が、特定のデータ利用に関して連携を始めている。"
      2: "データ担当者は、必要に応じて業務部門と連携している。"
      3: "データ担当者と業務部門は定期的に連携している。"
      4: "データ担当者と業務部門は密に連携しており、業務部門は自身の役割を理解し、データ担当者に積極的な支援を求めている。"
      5: "両者が協力してデータ利用や標準ルールが目的に合っているかを定期的に見直し、継続的に改善している。"

  - id: 5
    topic: "データガバナンスとスチュワードシップ"
    summary: "意思決定におけるデータの活用を促進し、管理する文化が定着している。"
    levels:
      0: "データ活用を促進・管理する仕組みはない。"
      1: "組織の一部でデータ活用が促進・管理されている。"
      2: "データを重視する部門では促進・管理されているが、他部門では行われていない。"
      3: "組織全体でデータ活用が促進・管理されており、一部の部門ではその重要性が十分に理解されている。"
      4: "組織全体でデータ活用の重要性が十分に理解されており、積極的に促進されている。"
      5: "組織全体でデータ活用が積極的に促進・評価され、データ駆動の文化が完全に定着している。"

  - id: 6
    topic: "データガバナンスとスチュワードシップ"
    summary: "データ倫理の原則や、データの適切な利用を管理する仕組みを導入している。"
    levels:
      0: "データ倫理の原則や適切な利用を管理する仕組みはない。"
      1: "法令遵守の最低限の対応は行っているが、データの適切な利用や偏り（バイアス）への配慮といった倫理的な観点がない。"
      2: "データの二次利用などについて、案件ごとに倫理的なリスクがないか法務部門等と検討している。"
      3: "組織としてのデータ倫理方針や利用ガイドラインが策定され、データ活用の判断基準として運用されている。"
      4: "データ利用の倫理的な妥当性を評価する仕組み（審査会など）が機能しており、違反やリスクを管理・報告する体制がある。"
      5: "データ倫理が組織文化として深く根付いている。透明性の高いデータ活用を通じて、社会的な信頼と持続可能な価値創出を実現している。"

  - id: 7
    topic: "データアーキテクチャー"
    summary: "エンタープライズ・データ・アーキテクチャー（EDA）を作成・保守・管理している。"
    levels:
      0: "エンタープライズ・データ・アーキテクチャーを管理していない。"
      1: "個別のシステム導入ごとにデータ設計が行われ、レガシーな構造が散在している。全体像を把握する図面や文書が欠如している。"
      2: "特定のプロジェクトや部門内ではデータモデルが作成・再利用されているが、組織全体を俯瞰したアーキテクチャー図（マスタープラン）はない。"
      3: "組織全体のデータフローやデータモデルの標準が定義され、文書化されている。新システム構築時にはこの EDA 標準への準拠が求められる。"
      4: "EDA の遵守率やアーキテクチャーの負債（不整合）が定量的に測定されている。ビジネス変化に応じたアーキテクチャーの変更が管理されたプロセスで行われている。"
      5: "EDA が経営戦略と完全に同期しており、新技術やデータ活用の変化に合わせてアーキテクチャーが自律的に最適化・進化し続けている。"

  - id: 8
    topic: "データアーキテクチャー"
    summary: "エンタープライズ・データ・アーキテクチャー（EDA）に適切なリソースを投入し、必要な能力を獲得している。"
    levels:
      0: "EDA にリソースを割り当てていない。"
      1: "専任リソースはなく、特定のシステム開発時に場当たり的に人員が割り当てられる。"
      2: "特定の部門や重要プロジェクトに限定して、データアーキテクト的役割を持つ人員が配置され、限定的な予算が確保されている。"
      3: "全社的な EDA 推進のための役割（データアーキテクト等）が定義され、組織的な予算と人員が継続的に確保されている。"
      4: "EDA に関連するスキルの成熟度が定量的に把握され、教育プログラムや専門ツールの導入により、組織能力の維持・向上が管理されている。"
      5: "最先端の技術動向に合わせた高度なスキルセットを常に確保し、リソースの最適配置により組織の変革をリードする能力を有している。"

  - id: 9
    topic: "データアーキテクチャー"
    summary: "ビジネス価値の創出を目的として、データ提供サービスの優先順位を判断する仕組みを導入している。"
    levels:
      0: "優先順位を判断する仕組みはなく、その必要性も認識されていない。"
      1: "依頼された順に対応しており、ビジネス価値の大小に関わらず作業が行われている。"
      2: "特定の部門や緊急案件が優先されがちだが、一部で優先度の基準を設けようとする動きがある。"
      3: "ビジネス目標に基づく優先順位の基準が定義され、価値の高いデータ提供が優先される仕組みがある。"
      4: "データ提供の費用対効果や処理効率が可視化され、実績データに基づいて優先順位や人員配分が管理されている。"
      5: "データが戦略的資産として認識され、価値創出に直結する案件が自動的に優先されるなど、投資判断と連動した運用が行われている。"

  - id: 10
    topic: "データモデリングとデザイン"
    summary: "業務要件を満たすため、標準化されたデータモデル（概念・論理・物理設計）を作成・管理している。"
    levels:
      0: "データモデルは作成されていない。"
      1: "システム開発時に場当たり的にデータベースの構造が設計されるのみで、業務要件を反映した論理的な設計図は存在しない。"
      2: "一部のプロジェクトでデータモデルが作成されているが、組織的な標準や命名規則はない。"
      3: "組織標準の設計ルールが定義され、各段階のデータモデルが文書化・維持されている。"
      4: "データモデルが専用のシステムで一元管理され、変更手順が定着している。モデルの再利用率が測定されている。"
      5: "ビジネスの変化に合わせてデータモデルが柔軟かつ迅速に進化し、システム設計と滑らかに連携している。"

  - id: 11
    topic: "データモデリングとデザイン"
    summary: "データモデルを組織の資産として一元管理し、命名規則や設計標準の遵守を徹底している。"
    levels:
      0: "データモデルの管理や標準化は行われていない。"
      1: "設計図が個人の PC 等に散在しており、最新版が不明な状態である。命名規則もプロジェクトごとにバラバラである。"
      2: "共有フォルダ等で設計図が保管され、基本的な命名規則はあるが、遵守状況の確認や版管理は手動で不完全である。"
      3: "専用の設計ツールや管理基盤が導入され、組織標準のルールに準拠したモデルが一元的に版管理されている。"
      4: "モデルの再利用率や標準の遵守率が測定されている。開発工程にモデルの検証手順が組み込まれ、不適合な設計を未然に防いでいる。"
      5: "モデル管理基盤がデータカタログ等と滑らかに連携している。開発者だけでなく業務担当者もデータモデルを検索・参照し、データ構造の理解に活用している。"

  - id: 12
    topic: "データストレージとオペレーション"
    summary: "データ資産のセキュリティ、可用性、および保守に関する運用手順を整備している。"
    levels:
      0: "標準的な運用手順は整備されていない。"
      1: "手順が文書化されておらず、セキュリティ対応やバックアップが担当者の経験に依存している。"
      2: "主要なシステムごとに運用手順書があり、一部のチームでは安定した運用が可能になっている。"
      3: "組織共通の運用マニュアルが整備され、セキュリティ対策や保守手順が全社で統一されている。"
      4: "運用手順の実施状況や障害発生率が測定され、実績データに基づいた手順の定期的な見直しが行われている。"
      5: "運用手順の大部分が自動化（コード化や自動修復など）されており、最新の脅威や技術に合わせて運用基盤が自律的に進化している。"

  - id: 13
    topic: "データストレージとオペレーション"
    summary: "データの生成から廃棄に至るライフサイクル全体を効果的に管理している。"
    levels:
      0: "データのライフサイクル管理は行われていない。"
      1: "データの保存や廃棄の計画がなく、容量が肥大化したり、不要なデータが放置されたりしている。"
      2: "特定のプロジェクトにおいて、データの保存期間や退避・削除のルールが暫定的に運用されている。"
      3: "全社的なライフサイクル方針が定義され、データの生成から廃棄までの各段階が体系的に管理されている。"
      4: "データの利用頻度に応じた保存先の自動振り分けや削除が実装され、コスト効率やルールの遵守状況が監視されている。"
      5: "データのビジネス価値の変化に応じてライフサイクルが動的に最適化され、コスト削減と価値の最大化が両立している。"

  - id: 14
    topic: "データストレージとオペレーション"
    summary: "データの変更履歴を適切に保存・管理し、過去の任意の状態を参照できるようにしている。"
    levels:
      0: "データの変更履歴を参照することはできない。"
      1: "変更履歴が断片的にしか残っておらず、過去の状態を再現することは極めて困難である。"
      2: "重要なデータにおいて、手動や個別の処理でバックアップ（世代管理）が行われ、過去データの参照が可能である。"
      3: "組織全体で履歴保持の標準手法が定義され、主要なデータの変更履歴を体系的に保存・参照できる。"
      4: "履歴データの保持コストと利用頻度が管理されている。必要に応じて過去の特定の状態を迅速かつ正確に復元できることが検証されている。"
      5: "高度な技術により、あらゆる時点のデータ状態を即座に再現でき、監査や分析に最大限活用されている。"

  - id: 15
    topic: "データストレージとオペレーション"
    summary: "システム障害やサービス停止時の連絡手順を確立している。"
    levels:
      0: "障害発生時の連絡手順は存在しない。"
      1: "障害発生後に場当たり的な連絡が行われるが、連絡漏れや遅延が頻発している。"
      2: "システムごとに緊急連絡先があり、障害時の連絡フローが定義されている（ただし周知は不十分）。"
      3: "全社共通の連絡体制が確立され、影響範囲の特定から利用者への通知までが標準化された手順で行われる。"
      4: "通知の迅速さや正確性が測定されている。定期的な訓練を通じて、連絡手順の有効性が評価・改善されている。"
      5: "システム監視と連動した自動通知の仕組みが整備され、関係者への状況共有がリアルタイムに行われている。"

  - id: 16
    topic: "データストレージとオペレーション"
    summary: "データ運用の自動化（DataOps）を推進し、拡張性、使いやすさ、保守性を考慮したデータ基盤を設計・構築している。"
    levels:
      0: "データ運用の自動化や効率化は行われていない。"
      1: "一部の担当者が個別に自動化を試みているが、場当たり的であり、拡張性や保守性は考慮されていない。"
      2: "特定のプロジェクトでデータ処理の基本的な自動化やバージョン管理が導入され、再利用可能な設計が使われ始めている。"
      3: "組織全体で標準的な自動化手順が定義され、拡張性と使いやすさを考慮した構築が行われている。"
      4: "データ処理の稼働状況やエラー率が定量的に監視され、その実績に基づいて計画的な保守・改善が行われている。"
      5: "高度に自動化されたセルフサービス型のデータ基盤が実現し、利用者が自律的にデータを活用できる環境が整っている。"

  - id: 17
    topic: "データセキュリティー"
    summary: "データ資産の機密性レベルを分類し、それぞれに必要なセキュリティ基準を定めている。"
    levels:
      0: "データの機密性による分類は行われていない。"
      1: "データの重要性は個人の主観で判断されており、統一された分類基準が存在しない。"
      2: "一部の部門や機密性の高いプロジェクトにおいて、独自の分類基準が設けられている。"
      3: "組織全体で統一されたデータ分類基準と、各レベルに応じたセキュリティ対策が定義・文書化されている。"
      4: "データの分類状況が一覧化され、適切に分類されている割合などが指標として管理されている。"
      5: "データの利用状況の変化に応じて分類が自動的に更新され、常に最適なセキュリティレベルが維持されている。"

  - id: 18
    topic: "データセキュリティー"
    summary: "保存されているデータに対して、定められたセキュリティ対策を適用している。"
    levels:
      0: "保存データに対するセキュリティ対策は適用されていない。"
      1: "対策の実施は管理者の裁量に任されており、暗号化やアクセス制御の状況が把握できていない。"
      2: "重要なデータベース等に限定して、暗号化やアクセス制限が個別に行われている。"
      3: "セキュリティ基準に基づき、データの暗号化、秘匿化、アクセス制御が組織全体で標準的に実装されている。"
      4: "基準の遵守状況を定期的な監査で確認している。設定不備などを早期に検知・修正する仕組みがある。"
      5: "常にアクセスが検証される仕組み（ゼロトラスト）が定着し、最新の脅威に対する防御策が自動で適用されている。"

  - id: 19
    topic: "データセキュリティー"
    summary: "データへのアクセスを管理し、利用者がプライバシー保護のルールを遵守しているか確認する体制を整えている。"
    levels:
      0: "プライバシー保護のルール遵守を確認する手順や体制はない。"
      1: "プライバシー保護は個人の良識に依存しており、具体的な監視や確認は行われていない。"
      2: "個人情報を扱う特定の業務において、利用申請や同意確認の手続きが部分的に導入されている。"
      3: "全社的な方針に基づき、アクセス権限の承認フローや利用目的の確認手順が確立・運用されている。"
      4: "データ利用履歴の定期的な監査が行われ、不適切なアクセスやルール違反を監視・指摘できる体制がある。"
      5: "システム設計の初期段階からプライバシー保護（匿名化や同意管理など）が組み込まれており、法規制の変化に即座に対応できる。"

  - id: 20
    topic: "データセキュリティー"
    summary: "個人情報保護法などの法令や規制要件を特定し、データ管理がそれに準拠しているかを定期的に監査している。"
    levels:
      0: "データ管理に関連する法令や規制要件を把握していない。"
      1: "法令対応は問題が起きた際に法務部門などが都度対応するのみで、データ管理の日常的な手順には組み込まれていない。"
      2: "個人情報を扱う特定の重要システムにおいてのみ、法令に準拠しているかの確認が個別に行われている。"
      3: "組織全体で遵守すべき法令・規制要件が明確に定義され、データ管理状況に対する定期的な監査手順が確立されている。"
      4: "監査結果が定量的に評価され、発見されたコンプライアンス違反のリスクが計画的かつ継続的に是正されている。"
      5: "法規制の変更を迅速に捉え、データ管理方針やアクセス制御の仕組みに自動的・動的に反映させる体制が整っている。"

  - id: 21
    topic: "データセキュリティー"
    summary: "データの漏洩やサイバー攻撃に備え、セキュリティ事故発生時の対応計画を策定している。"
    levels:
      0: "事故発生時の対応計画は用意されていない。"
      1: "事故発生時は、その都度関係者が集まって対応を検討する場当たり的な状態である。"
      2: "主要なリスクに対して、連絡網や簡易的な初動対応手順が作成されている。"
      3: "専門の対応チーム（CSIRT など）の体制が明確化され、全社的な対応計画が策定・周知されている。"
      4: "定期的な訓練で対応計画の有効性が評価され、目標復旧時間などの指標に基づいて計画が改善されている。"
      5: "最新の脅威情報を活用し、予兆段階での検知・防御が自動化されている。事故の教訓を即座にシステム設計に反映する体制がある。"

  - id: 22
    topic: "データ統合と相互運用性"
    summary: "システム間や部門間でのデータ統合の必要性を理解し、計画に反映している。"
    levels:
      0: "データ統合の必要性は認識されていない。"
      1: "連携が必要な際にその都度個別に対応しており、全体最適の視点がない。"
      2: "特定の部門においてデータ統合の有効性が認識され、一部のシステム間で統合が試みられている。"
      3: "組織全体でデータ統合の重要性が合意されている。どのデータをなぜ統合すべきかというニーズが体系的に整理されている。"
      4: "データ統合のニーズが定期的に見直され、統合によるビジネス価値が定量的に評価されている。"
      5: "将来のビジネス変化や外部との連携を見据え、潜在的な統合ニーズを先取りしてシステム設計に反映している。"

  - id: 23
    topic: "データ統合と相互運用性"
    summary: "戦略的な計画に基づき、データ統合基盤を運用・活用している。"
    levels:
      0: "データ統合は行われていない。"
      1: "データの移動は手動や場当たり的な処理に依存しており、計画的な運用は行われていない。"
      2: "一部の業務でデータ連携が自動化されているが、独自の作り込みが多く、再利用性や拡張性に乏しい。"
      3: "全社的な統合基盤が導入され、標準化された手法と戦略的な計画に沿ってデータが統合・運用されている。"
      4: "データ統合の処理性能や信頼性が指標として管理されている。"
      5: "データ統合が組織のデジタル基盤の中核として機能し、新サービスの迅速な立ち上げやリアルタイムな状況把握を支える戦略的な武器となっている。"

  - id: 24
    topic: "データ統合と相互運用性"
    summary: "システム間でデータを連携する際の、データ変換やマッピング（紐づけ）のルールを文書化し、一貫性を確保している。"
    levels:
      0: "変換やマッピングのルールは文書化されていない。"
      1: "連携時の変換ルールはプログラムのコード内に直接書かれており、担当者以外は仕様を把握できない。"
      2: "特定のシステム連携において、表計算ソフト等でマッピング定義書が作成されているが、全社的な標準フォーマットはない。"
      3: "組織全体で標準化されたフォーマットや管理ツールを用いて、データ変換・マッピングのルールが一元的に文書化・管理されている。"
      4: "マッピングルールがメタデータとして管理されており、システム改修時にデータ連携への影響範囲を正確に調査できる。"
      5: "AI などを活用してシステム間のデータマッピングが自動提案されるなど、連携ルールの作成と維持が高度に効率化されている。"

  - id: 25
    topic: "データ統合と相互運用性"
    summary: "データ連携処理（パイプライン）の稼働状況を監視し、エラー発生時の検知と対応の仕組みを整備している。"
    levels:
      0: "データ連携処理の監視やエラー対応の仕組みはない。"
      1: "連携エラーは利用者からの問い合わせで初めて発覚する。対応は手作業で場当たり的に行われる。"
      2: "基本的な実行ログは出力されているが、エラーの確認は手動で行われており、検知に遅れが生じることがある。"
      3: "監視ツールが導入され、データ連携の失敗や遅延が自動的に検知され、担当者に通知される仕組みが運用されている。"
      4: "処理時間やデータ欠損などの指標が監視され、エラー発生時の自動再実行（リトライ）や復旧手順が確立されている。"
      5: "障害の予兆を検知して未然に防ぐ仕組みや、エラー発生時にシステムが自律的に復旧する（自己修復）高度な運用が実現している。"

  - id: 26
    topic: "データ統合と相互運用性"
    summary: "多様で大規模なデータ（ビッグデータ）を積極的に収集し、効果的に活用している。"
    levels:
      0: "大規模なデータの収集は行われていない。"
      1: "既存システムの定型データのみを扱っており、文書や外部データなどの多様なデータの活用は進んでいない。"
      2: "ログや SNS など一部の非定型データの収集を始めているが、実験的な活用に留まっている。"
      3: "拡張性の高いデータ基盤が整備され、多様で大規模なデータを体系的に収集・統合して分析できる環境がある。"
      4: "データの収集コストと活用価値が最適化されている。連続的なデータ処理により、リアルタイムに近い形での活用が行われている。"
      5: "大規模データが競争力の源泉となっており、予測分析や個別化（パーソナライゼーション）を通じてビジネスモデルの変革を実現している。"

  - id: 27
    topic: "ドキュメントとコンテンツ管理"
    summary: "非定型データ（文書、画像、動画など）の保存から廃棄までの流れとアクセス権を適切に管理している。"
    levels:
      0: "文書やコンテンツの管理方針は存在しない。"
      1: "ファイルが個人の PC 等に散在しており、必要な情報の検索や版管理が困難である。"
      2: "部門ごとに共有フォルダのルールはあるが、全社的な文書管理システムは導入されていない。"
      3: "全社的な文書管理システムが導入され、情報のタグ付け、版管理、アクセス制御が標準化されている。"
      4: "データの利用頻度や価値に基づく保存先の自動振り分けや退避処理が行われ、保管コストと検索性能が最適化されている。"
      5: "AI を活用したコンテンツの自動分類や検索の最適化が行われ、非定型データから高度なビジネス価値を引き出している。"

  - id: 28
    topic: "ドキュメントとコンテンツ管理"
    summary: "法令や規制、業務上の証拠として重要な文書を特定し、適切な保管・保護・廃棄の手順（記録管理）を実施している。"
    levels:
      0: "記録管理の概念がなく、法令に基づく文書の保管や廃棄が行われていない。"
      1: "法定文書の保管が担当者任せであり、紛失リスクや不要な文書が永久に保存されるリスクを抱えている。"
      2: "経理や法務など特定の部門でのみ法定保存期間に基づく管理が行われているが、全社的なルールやシステムによる統制はない。"
      3: "組織全体で記録管理の方針（保存期間や法的な保全手順など）が定義され、重要な証拠が改ざん不可能な状態で適切に保管されている。"
      4: "記録の保存期限の監視と廃棄手順がシステム化・自動化されている。定期的な監査により、法令遵守の状況が定量的に評価されている。"
      5: "法規制の変更に合わせて管理方針が動的に更新される。法的な情報開示要求への対応が高度に自動化され、訴訟や監査のリスクとコストが最小化されている。"

  - id: 29
    topic: "ドキュメントとコンテンツ管理"
    summary: "文書の版管理とタグ付けを徹底し、組織内の知識として正確な情報を迅速に検索・活用できる仕組みを整備している。"
    levels:
      0: "文書の版管理や検索性を向上させる仕組みはない。"
      1: "ファイル名による手動の版管理が横行しており、最新情報の特定に時間がかかる。検索は人に聞くことに依存している。"
      2: "一部の部門で情報共有ツールが使われているが、組織全体でのタグ付けのルールがなく、部門をまたいだ検索が困難である。"
      3: "全社的な文書管理システム上で、統一されたルールに基づくタグ付けと、自動的な版管理（同時編集の防止や変更履歴の保持）が運用されている。"
      4: "文書の検索成功率や閲覧頻度が測定されている。利用されていない古い情報の棚卸しが定期的な手順として定着している。"
      5: "全社横断の検索機能が高度化され、定型データと非定型データを統合して検索・分析できる。必要な知識が利用者の業務に合わせて自動的に提示される。"

  - id: 30
    topic: "参照データとマスターデータ管理"
    summary: "全社的なマスターデータ管理（MDM）を導入し、中核となるデータを統合している。"
    levels:
      0: "マスターデータ管理の仕組みは導入されていない。"
