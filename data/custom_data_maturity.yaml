      4: "名寄せの精度（一致率や誤検知率など）が定量的に測定されている。例外データの手動確認手順が確立され、照合ルールが継続的に改善されている。"
      5: "AI や機械学習を活用した高度な名寄せ（あいまい検索や推論など）が導入され、複雑なデータでも高精度かつ動的にゴールデンレコードが維持されている。"

