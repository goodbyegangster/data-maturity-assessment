      4: "ユーザーへのタイムリーなアドバイスと高品質なサービス提供におけるユーザーエクスペリエンス向上のためにデータを活用することは、組織全体で十分に理解され、奨励されている。上級管理職は、サービス提供におけるデータ活用の促進と監督に責任を負う。"
      5: "ユーザーへのタイムリーなアドバイスと高品質なサービスの提供におけるユーザーエクスペリエンス向上を目的としたデータ活用は、組織全体で積極的に推進され、定期的に評価され、十分に理解されている。上級管理職は、サービス提供におけるデータ活用の促進、監督、改善に責任と説明責任を負う。"

  - id: 10
