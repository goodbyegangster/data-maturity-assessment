  - id: 24
    topic: "データ管理 – 運用"
    summary: "組織のデータ資産の保存と保守により、履歴データを維持し、特定のデータ資産の履歴を表示できるようになっている。"
    levels:
      0: "組織のデータ資産の保管および保守では、履歴データを維持し、特定のデータ資産の履歴を表示することができない。"
      1: "組織のデータ資産の保管と管理には、履歴ビューを可能にする機能が備わっている。しかし、この機能は実際には難しく、広く利用されていない。"
      2: "組織によるデータ資産の保管および保守により、一部のデータ資産の履歴を表示できるが、この機能は特定の状況でのみ使用される。"
      3: "組織のデータ資産の保管と保守では、データ資産の履歴を簡単に閲覧でき、これがデフォルトのオプションとなっている。しかし、スタッフの間でこの機能へのアクセス方法に関する知識は限られている。"
      4: "組織のデータ資産の保管と管理は、データ資産の履歴を容易に閲覧できるようにしており、これは必須のオプションである。ほとんどのスタッフはこの機能へのアクセスに問題がなく、データ資産のバージョンは定期的に保存されている。"
      5: "組織のデータ資産の保管と管理は、組織の全データ資産の履歴を容易に閲覧できるようにしており、これは必須のオプションである。組織スタッフはこの機能へのアクセスに熟練しており、データ資産のバージョンは定期的に保存されている。"

  - id: 25
    topic: "データ管理 – 運用"
    summary: "組織は、データベースが必要な使用率レベルをサポートできることを確認するために、データベースの容量計画を実行している。"
    levels:
      0: "組織はデータベースの容量計画を実行していない。"
      1: "組織はデータベースのキャパシティプランニングを定期的に実施しておらず、利用率も十分に把握されていない。"
      2: "組織は、大規模なデータベースの一部に対して定期的に容量計画を実行し、過去の利用レベルと比較している。"
      3: "組織はほとんどのデータベースに対して定期的に容量計画を実行し、過去の利用レベルと比較している。"
      4: "組織はほとんどのデータベースに対して定期的な容量計画をスケジュールして実行し、それらを過去および予想される将来の使用率と比較する。"
      5: "組織は、すべてのデータベースについて定期的なキャパシティプランニングを実施し、過去の利用状況と将来の利用予測と比較している。キャパシティニーズは定期的に見直され、投資決定の一環として考慮されている。"

  - id: 26
    topic: "データ管理 – 運用"
    summary: "組織では、システムの停止やデータベース サービスの中断を伝達するための手順を確立している。"
    levels:
      0: "組織には、システムの停止やデータベース サービスの中断を伝達するための手順がない。"
