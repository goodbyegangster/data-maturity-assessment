      2: "組織は、一部のシステム障害やサービス中断に関する連絡手順を策定している。これらの手順は組織内の特定の領域でのみ遵守されており、コンプライアンスチェックは実施されていない。"
      3: "組織は、すべてのシステム停止およびデータベースサービスの中断について通知するための手順を確立している。組織内のほとんどのデータ利用者はこれらの手順を認識しており、コンプライアンスチェックも実施されている。"
      4: "組織は、すべてのシステム停止およびデータベースサービスの中断について通知するための業界のベストプラクティス手順を導入している。組織内のすべてのデータ利用者はこれらの手順を理解しており、定期的なコンプライアンスチェックが実施されている。"
      5: "システム障害およびデータベースサービスの中断に関する連絡について、業界のベストプラクティスに基づく手順を導入している。これらの手順が目的に適合していることを確認するために、定期的に評価を行っている。組織内のすべてのデータ利用者はこれらの手順を理解しており、定期的なコンプライアンスチェックを実施している。"

  - id: 27
    topic: "データ管理 – 運用"
    summary: "組織のデータ共有業務は、データ共有に関する政府間協定（IGA）に準拠しており、データ利用可能性・透明性法（DATA）スキームを含む、オーストラリア政府の関連法令、規制、政策の有効な実施をサポートしている。注：[データ共有に関する政府間協定（IGA）](https://www.finance.gov.au/government/public-data/data-and-digital-ministers-meeting/intergovernmental-agreement-data-sharing)、[DATAスキームの紹介](https://www.datacommissioner.gov.au/data-scheme)"
    levels:
      0: "組織のデータ共有業務はIGAに準拠しておらず、DATAスキームを含む関連する政府の法律、規制、政策の効果的な実施をサポートしていない。"
      1: "組織は、IGAの影響を理解し、DATAスキームを含むオーストラリア政府の法令、規制、政策の実施状況の改善に取り組んでいる。現在、データ共有はアドホックな方法で行われており、データ共有を支援する担当者は未定である。"
      2: "組織の一部の部署は、IGAおよびオーストラリア政府法の効果的な実施を一貫して支援する方法でデータを共有している。IGAおよびオーストラリア政府法の効果的な実施を一貫して支援する体制が整っていない部署は、その実現に向けて取り組んでいる。ほとんどのデータ領域は、DATAスキームを含む関連する政府の法律、規制、および政策の効果的な実施を支援するために、体系的かつ安全な方法でデータを共有している。組織は、データ共有を支援する責任者を特定していない。"
      3: "組織のデータ共有業務は、IGAおよびオーストラリア政府法の効果的な実施、ならびにIGAに準拠した業務運営という期待を一貫してサポートする形で運営されている。組織のほとんどの部門は、安全かつ合法的かつ倫理的に可能な範囲で組織のデータを共有しており、それに応じたリソースが配分されている。組織は、データ共有を支援するための担当スタッフを任命している。"
      4: "データ共有業務は、IGAおよびオーストラリア政府の法令に準拠している。組織のほとんどの部門は、安全かつ合法的かつ倫理的に可能な範囲で、データを共有しており、それに応じたリソースが提供されている。データ共有を支援する責任者として、特定のスタッフが任命され、関連する政府の法令、規制、および政策を効果的に実施する権限が与えられている。"
      5: "当組織のデータ共有業務は、IGAおよびオーストラリア政府の法令に準拠しており、IGA作業プログラムおよびDATAスキームにも参加している。組織のあらゆる部門は、安全かつ合法的かつ倫理的に可能な範囲で組織のデータを共有し、それに応じたリソースを割り当てられている。これらのポリシーは定期的に見直されている。データ共有を支援する責任者として、特定のスタッフが任命され、関連する政府の法令、規制、および政策を効果的に実施する権限を与えられている。"

  - id: 28
    topic: "データ管理 – 運用"
