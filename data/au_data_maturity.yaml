      1: "組織は、データからの価値創造を支援するために、データ運用、データ分析、データ管理、データエンジニアリングにおける継続的なプロセス改善のための手順と管理体制を整備中、または最近整備した。"
      2: "組織は、組織内の一部のデータからの価値創造を支援するため、データ運用、データ分析、データ管理、データエンジニアリングにおける継続的なプロセス改善のための手順と管理体制を確立した。これらの手順は組織の特定の領域でのみ遵守されており、コンプライアンスチェックは実施されていない。"
