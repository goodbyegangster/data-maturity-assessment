      5: "組織は幹部のデータに関する説明責任の原則をすべて組織に組み入れており、これらの原則は積極的に推進され、定期的に評価され、組織全体で十分に理解されている。上級管理職は、幹部のデータに関する説明責任の原則の実施を促進、監督、改善する責任と説明責任を負う。"

  - id: 11
    topic: "データ管理 – 戦略とガバナンス"
    summary: "適切なデータの使用、標準、およびプロセスの遵守を確保するために、組織のデータ分析リーダーと他のビジネス ユニットの間で明確なコラボレーション プラクティスが存在する。"
    levels:
      0: "組織のデータ責任者と事業部門は明確な形で連携していない。"
      1: "組織内のいくつかの部門は、一部のデータ資産における適切なデータ使用を確保するために協力している。"
      2: "組織の上級データ分析リーダーは、組織で連携し、必要に応じて組織内の他の分野のビジネスユニットと協議して、データの使用、標準、およびプロセスを遵守していることを確認する。"
      3: "組織のデータリーダーは、組織のパートナーと定期的に連携し、データの使用、標準、プロセスの適切な遵守を確保している。各事業部門は、プロジェクトに関してデータリーダーからの指導を積極的に求めている。"
      4: "組織のデータリーダーは、データの使用、標準、およびプロセスの適切な遵守を確保するために、潜在的な組織パートナーを積極的に探する。各事業部門は自らの義務を理解し、業務を遂行する際にデータリーダーからの指示を求める。"
      5: "組織のデータリーダーは、組織のパートナーと定期的に連携し、組織のデータ利用、基準、プロセスが目的に合致しているかどうかを検討し、必要に応じて変更を加える。各事業部門は自らの義務を理解し、業務を開始する前にデータリーダーの指示を求める。"

  - id: 12
    topic: "データ管理 – 戦略とガバナンス"
    summary: "組織は、主要なデータ資産についてデータ管理者とデータスチュワードを選定し、データの品質、取り扱い、アクセス、組織による利用に関する期待と責任を明確に定義している。注：「データ管理者」および「データスチュワード」の定義は、本ツールに付属するガイドの用語集セクションに記載されている。"
    levels:
      0: "組織はデータ管理者やデータ保管者、またその役割や責任を正式に定義していない。"
      1: "組織の最大のデータ資産の一部については、データ管理者とデータスチュワードが任命されているが、その役割と責任は異なる場合があり、担当分野外では十分に理解されていない。コンプライアンスチェックは実施されていない。"
      2: "組織のデータ資産の大部分については、データ管理者とデータスチュワードが特定されている。彼らの役割と責任は、彼らが定期的に関与する組織内の部門にのみ理解されている。不定期のコンプライアンス活動も行われている。"
      3: "組織のほぼすべてのデータ資産について、データ管理者とデータスチュワードが特定されており、その役割と責任は組織全体で一貫して定義され、理解されている。また、いくつかのコンプライアンスチェックも実施されている。"
      4: "組織内のすべてのデータ資産について、データ管理者とデータスチュワードが特定され、その役割と責任は組織全体で一貫して定義・理解されている。コンプライアンスは積極的に監視され、報告されている。"
      5: "組織内のすべてのデータ資産について、データ管理者とデータスチュワードが特定され、その割り当てが最新の状態に維持されるようレビューされている。彼らの役割と責任は組織全体で一貫して定義され、理解されている。コンプライアンスは積極的に監視され、報告されている。"

  - id: 13
    topic: "データ管理 – 戦略とガバナンス"
    summary: "所属組織は、担当するデータセットに適用されるデータの定義、形式、および標準プロセスに関する最終決定を行う権限を特定の担当者に付与している。"
    levels:
      0: "組織はデータセットに関する決定を下す権限を持つ人員を指定せず、代わりに組織階層に依存して権限委譲を管理している。"
      1: "組織は、担当するデータセットに関する具体的な決定を下す権限を持つ少数のスタッフを正式に任命しているが、ほとんどのデータセットには最終決定権者が明確に定められていない。権限を持つスタッフの認知度は低い。"
      2: "組織は、担当するデータセットに関する具体的な意思決定を行う権限を持つスタッフを正式に特定しているが、一部のデータセットについては、依然として最終意思決定者が明確に定義されていない。ほとんどのデータ利用者は、権限のある意思決定者が存在することを認識している。"
      3: "組織は、担当するデータセットに関する具体的な意思決定を行う権限を持つ関係者全員を正式に特定した。小規模でニッチなデータセットのみ、最終的な意思決定者が明確に定義されていない。データ利用者は皆、これらの役割と権限を概ね認識している。"
      4: "組織は、担当するデータセットに関する意思決定を行う権限を持つ関係者全員を正式に特定している。権限の配分は、適切性を維持するために定期的に見直されている。すべてのデータ利用者は、これらの役割を認識し、自らの権限を理解している。"
      5: "組織は、担当するデータセットに関する意思決定を行う権限を持つ関係者全員を正式に特定している。権限の配分は、適切なものであることを確認するために定期的に見直されている。すべてのデータ利用者は、これらの役割を認識し、自らの権限を理解している。"

  - id: 14
    topic: "データ管理 – 戦略とガバナンス"
    summary: "組織全体で、データ管理業務をサポートするために、スタッフ全員またはほとんどのスキルアップに投資が行われている。"
    levels:
      0: "組織は、データ管理業務をサポートするためにスタッフのスキルを向上させるためのリソースを特別に割り当てていない。"
      1: "組織は、組織内の一部のスタッフのスキルアップに少額のリソースを割り当てているが、そのリソースは広範囲に及んでおらず、また、データ管理業務に特化しているわけではない。組織は、スタッフのスキルアップにこのような投資を行う必要性を理解していない。"
      2: "組織は、組織内のデータ重視分野におけるデータ管理業務を支援するスタッフのスキルアップにリソースを割り当てている。この資金は、組織のデータ管理投資ニーズとは関連していない。"
      3: "組織はデータ管理への投資ニーズを理解しており、スタッフのデータ管理スキル全般の向上に適切な資金を割り当てている。"
      4: "組織はデータ管理への投資ニーズを理解しており、資金提供とスタッフのデータ管理スキルの向上を明確に結び付けている。これは定期的に評価されている。"
      5: "組織は、スタッフの現在および将来のデータ管理スキルへの投資に積極的に資金を提供し、この資金が変化の実現にどの程度効果的であるかを積極的に評価している。"

  - id: 15
    topic: "データ管理 – アーキテクチャ"
    summary: "組織は、データに関連する潜在的な価値創造の観点から、データアーキテクチャを管理している。注：データアーキテクチャは、収集されるデータの種類、その保存方法、整理方法、統合方法、および利用方法を規定するモデル、パターン、ポリシー、ルール、および標準で構成されている。これらの要素は、組織全体にわたるデータの流れと管理を規制し、データソースから消費者に利用可能なデータを提供する。"
    levels:
      0: "組織は、データに関連する潜在的な価値創造を考慮してデータ アーキテクチャを管理していない。"
      1: "組織のレガシーアーキテクチャは、組織のデータの価値を最大化するのに適していない。"
      2: "データ アーキテクチャの改善による価値創造の可能性は、主要な担当者によって理解されている。"
      3: "組織は、組織のデータに関連する価値創造を改善する方法を検討している。"
      4: "組織のデータ アーキテクチャは、組織のデータに関連する価値創造によって決まる。"
      5: "組織のデータ アーキテクチャは定期的にレビューされ、価値の創造が継続的に測定され、現在のニーズを反映した変更が行われる。"

  - id: 16
    topic: "データ管理 – アーキテクチャ"
    summary: "組織のデータアーキテクチャは、データ管理とエンタープライズアーキテクチャの原則を考慮して管理されている。注：「エンタープライズアーキテクチャの原則」の定義は、このツールに付属するガイドの用語集セクションに記載されている。"
    levels:
      0: "組織は、データ管理およびエンタープライズ アーキテクチャの原則を考慮してデータ アーキテクチャを管理していない。"
      1: "組織のデータ管理とエンタープライズ アーキテクチャの原則、およびそれらが組織のデータ アーキテクチャにどのように適用されるかについての認識は、ICT 領域に限定されている。"
      2: "組織の一部と、組織の ICT 分野以外の上級管理職は、データ管理とエンタープライズ アーキテクチャの原則を理解し、組織のデータ アーキテクチャに組み込むよう努めているが、その適用は不完全で限られている。"
      3: "組織のほとんどの部門では、データ アーキテクチャを管理する際に、データ管理とエンタープライズ アーキテクチャの原則を考慮する。"
      4: "組織は、データ管理とエンタープライズ アーキテクチャの原則をデータ アーキテクチャ管理に組み込んでいる。"
      5: "組織のデータ アーキテクチャは、データ管理とエンタープライズ アーキテクチャの原則のベスト プラクティスを明確に体現しており、目的に適合し続けるように定期的にレビューされている。"

  - id: 17
    topic: "データ管理 – アーキテクチャ"
    summary: "組織の関連アーキテクチャ（データウェアハウスアーキテクチャ、データメッシュ、データ統合アーキテクチャなど）に関するモデルと計画が文書化され、データ管理の側面に適用されている。注：これらの用語の一部は、このツールに付属するガイドの用語集セクションに記載されている。"
    levels:
      0: "関連するアーキテクチャに関する組織のモデルと計画は文書化されておらず、データ管理の側面に適用されていない。"
      1: "組織は、関連するアーキテクチャのモデルと計画を随時文書化する。"
      2: "組織は、いくつかの関連アーキテクチャのモデルと計画を文書化しており、それらは組織の一部のデータ管理の側面に適用されている。"
      3: "組織は、関連するすべてのアーキテクチャのモデルと計画を文書化しており、それらは組織全体のほとんどのデータ管理の側面に適用されている。"
      4: "関連するすべてのアーキテクチャについてモデルと計画を策定し、組織全体のデータ管理のあらゆる側面に適用している。これらのモデルと計画は、目的に適合し続けるよう定期的に見直されている。"
      5: "組織は、関連するアーキテクチャに関するモデルと計画の実装と運用を積極的に監視し、組織内の各部門におけるそれらの差異を把握している。モデルと計画は定期的に見直され、目的に適合した状態が維持されていることを確認している。"

  - id: 18
    topic: "データ管理 – アーキテクチャ"
    summary: "組織では、関連する製品や作業の作成と保守をサポートするために、データ アーキテクチャに関して適切なリソースを投入し、必要な能力を獲得している。"
    levels:
      0: "組織は、関連する製品や作業の作成と保守をサポートするためのデータ アーキテクチャ機能にリソースを割り当てていない。"
      1: "組織には、データアーキテクチャに関するリソースと能力、そして既存のリソースがある程度存在する。しかし、これらは組織内の限られた領域に限定されており、関連する製品や業務の作成と維持に支障をきたしている。その結果、業務のバックログは時間とともに増加している。"
      2: "組織は、データアーキテクチャに関するリソースのニーズと能力を特定し、関連する製品や業務の作成と保守を改善するための道筋を特定した。その結果、該当する場合、過去の作業のバックログは時間の経過とともに減少している。"
      3: "組織は、関連する製品および作業の現在の作成と保守をサポートするために十分なデータ アーキテクチャ リソースと能力を割り当てている。"
      4: "組織は、関連する製品および作業の現在の作成と保守をサポートし、改善するために十分なデータ アーキテクチャ リソースと能力を割り当てている。"
      5: "データアーキテクチャ関連の製品および業務の現状の創出と維持管理を支援・改善するために、十分なリソースと能力を割り当てている。また、将来のニーズを積極的に予測し、リソースと能力がそれを反映するように仕組みを整えている。"

  - id: 19
    topic: "データ管理 – アーキテクチャ"
    summary: "組織はDataOpsとModelOpsを管理し、拡張性、アクセシビリティ、ユーザビリティ、長期運用性、保守性を考慮しながらソリューションを設計・構築する。設計・構築フェーズでは、ソフトウェア開発ライフサイクル（SDLC）の原則を理解し、適用している。注：「DataOps」、「ModelOps」、「SDLC」の定義は、本ガイドの用語集セクションに記載されている。"
    levels:
      0: "組織はDataOpsとModelOpsを管理していない。SDLCの原則が十分に理解されておらず、設計および作成フェーズで適用されていない。"
      1: "組織のDataOpsとModelOpsの管理は、事後対応的であり、短期的なニーズに基づいている。組織は関連するSDLC原則と、それらが設計・構築フェーズとどのように関連しているかを認識しているが、それらは均一に適用されていない。"
      2: "組織は、DataOpsとModelOpsの管理において、SLDCの原則とメンテナンスを時折検討しているが、多くの場合、事後対応的であり、短期的なニーズに基づいている。組織は関連するSDLCの原則と、それらが設計・構築フェーズとどのように関連しているかを認識しているが、適用するのはごく稀である。"
      3: "組織は、DataOpsとModelOpsの管理において、拡張性、アクセシビリティ、ユーザビリティ、そして長期性を考慮している。しかしながら、場合によっては、その管理は事後対応的であり、短期的なニーズに基づいていることもある。組織は、関連するSDLCの原則を設計および構築フェーズに適用している。"
      4: "組織は、DataOpsとModelOpsの管理において、拡張性、アクセシビリティ、ユーザビリティ、そして長期運用性を積極的に考慮している。しかしながら、従来の仕組みも依然として残っている。組織は、設計・構築フェーズにおいて、関連するSDLC原則を積極的に適用している。"
      5: "組織は、DataOpsおよびModelOpsシステムを、拡張性、アクセシビリティ、ユーザビリティ、そして長期運用性を重視して設計している。設計・構築段階においては、関連するSDLCの原則を積極的に適用している。システムは定期的にレビューされ、ニーズの変化に応じて更新されている。"

  - id: 20
    topic: "データ管理 – アーキテクチャ"
    summary: "組織は、市販のCOTS（商用オフザシェルフ）ソリューションを統合する前に、既存のデータ利用モデルおよび環境との互換性を確認している。注：「COTS」の定義は、このツールに付属するガイドの用語集セクションに記載されている。"
    levels:
      0: "組織は、COTS ソリューションを統合する前に、データ使用のために導入されている既存のモデルや環境との互換性について COTS ソリューションを審査しない。"
      1: "政府組織は、データ使用のために導入されている既存のモデルや環境との互換性を考慮せずに新しい COTS ソリューションを導入することが多く、その結果、統合が制限されることがよくある。"
      2: "スタッフに対し、新しいCOTSソリューションを購入する前に、既存のデータ利用モデルおよび環境との互換性を検討することを推奨するガイドラインを策定している。これらのガイドラインの遵守状況はまちまちである。"
      3: "組織は、スタッフに対し、新しいCOTSソリューションを購入する前に、既存のデータ利用モデルおよび環境との互換性を検討することを義務付けている。この評価結果は、承認前に提出する必要がある。この方針は広く遵守されている。"
      4: "政府組織のスタッフは、購入前に、新しいCOTSソリューションと既存のデータ利用モデルおよび環境との互換性を積極的に検討する。この評価結果は、承認前に提出する必要がある。このポリシーは広く遵守され、コンプライアンスが徹底されている。"
      5: "組織スタッフは、購入前に、新しいCOTSソリューションと既存のデータ利用モデルおよび環境との互換性を積極的に検討する。この評価結果は、承認前に提出する必要がある。このポリシーは広く遵守されている。組織は、互換性のあるCOTSソリューションを特定した調達スケジュールを策定している。"

  - id: 21
    topic: "データ管理 – 運用"
    summary: "組織は、データ資産のセキュリティ、有用性、および保守を確保するための手順を整備している。注: データ資産とは、データで構成されるあらゆるものであり、通常はシステム、アプリケーション、ドキュメント、データベース、オンラインコンテンツなどの製品を指する。"
    levels:
      0: "組織は、データ資産のセキュリティ、使いやすさ、メンテナンスを確保するための標準的な手順を整備していない。"
      1: "組織は、データ資産のセキュリティ、使いやすさ、メンテナンスを確保するための手順を開発中、または最近開発した。"
      2: "組織は、データ資産のセキュリティ、有用性、および維持を確保するための定期的な手順を策定している。これらの手順は組織内の特定の領域でのみ遵守されており、コンプライアンスチェックは実施されていない。"
      3: "組織は、データ資産のセキュリティ、有用性、および保守を確保するための手順を確立している。組織内のほとんどのデータ利用者はこれらの手順を認識しており、最低限のコンプライアンスチェックも実施されている。"
      4: "組織は、データ資産のセキュリティ、ユーザビリティ、およびメンテナンスを確保するための業界のベストプラクティス手順を導入していることに満足している。組織内のすべてのデータ利用者はこれらの手順を理解しており、定期的なコンプライアンスチェックを実施している。"
      5: "組織は、データ資産のセキュリティ、ユーザビリティ、およびメンテナンスを確保するための業界のベストプラクティス手順を導入していることに満足している。組織は、これらの手順が目的に適合していることを確認するために定期的に評価を行っている。組織内のすべてのデータ利用者はこれらの手順を理解しており、定期的なコンプライアンスチェックを実施している。"

  - id: 22
    topic: "データ管理 – 運用"
    summary: "組織は、データ資産をそのライフサイクル全体にわたって効果的に管理している。"
    levels:
      0: "組織は、データ資産のライフサイクル全体にわたって積極的な管理を行っていない。また、ライフステージや各ステージにおける活動を定義するフレームワークも使用していない。"
      1: "組織は、主要なデータ資産の一部をライフサイクル全体にわたって管理している。管理はライフサイクルのいくつかの段階に重点が置かれており、一部の段階は管理が不十分である。"
      2: "組織は主要なデータ資産をライフサイクル全体にわたって効果的に管理している。しかし、一部の小規模なデータ資産はデータ管理システムに取り込まれていない。"
      3: "組織は主要なデータ資産をライフサイクル全体にわたって管理しているが、一部の段階では管理が不十分なままである。"
      4: "組織は、すべてのデータ資産をそのライフサイクル全体にわたって効果的に管理し、新しい資産がデータ管理システム内に統合されるようにする。"
      5: "組織は、すべてのデータ資産をライフサイクル全体にわたって効果的に管理し、新しい資産がデータ管理システムに統合されるようにしている。また、プロセスが目的に適合していることを確認するために、定期的にプロセスを見直している。"

