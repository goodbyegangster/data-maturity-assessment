title: "豪州政府 Data Maturity Assessment"

model: "au"

modelId: 2

modelDescription: |-
  - 財務省は、各機関が自組織のデータ成熟度を一貫した手法で測定・把握できるよう「データ成熟度評価ツール（以下、本ツール）」を開発しました。これにより、APS（オーストラリア公務員部門）全体のデータ成熟度と能力を、長期的かつエビデンスに基づいて測定する統一的な手段が提供されます。
  - 本ツールは、データ・デジタル政府戦略に掲げられた政府のデータアジェンダも支援するものです。APS全体のデータ成熟度を客観的に測定・追跡することで、各機関および政府が改善すべき領域や取り組むべき課題を特定するのに役立ちます。
  - > The Department of Finance has developed the Data Maturity Assessment Tool (the Tool) to provide agencies with a consistent approach to measuring and understanding their organisation’s data maturity, providing a consistent, longitudinal evidence-based means of measuring APS data maturity and capability. It will also support the Government’s data agenda as outlined in the [Data and Digital Government Strategy](https://www.dataanddigital.gov.au/). By objectively measuring and tracking whole-of-APS data maturity, the Tool will help agencies and the Government identify areas for improvement and action.
  - [Data Maturity Assessment Tool](https://www.finance.gov.au/government/public-data/public-data-policy/data-maturity-assessment-tool)

maturityLevels:
  - level: 0
    name: "無管理"
    description: "機関のどの部門でも行われていない。"

  - level: 1
    name: "初期 / 即席(その場限り)"
    description: "一部の事業領域で行われている、部分的に行われている。"

  - level: 2
    name: "構築中"
    description: "組織全体の視点を構築する、組織全体の議題に上がっている。"

  - level: 3
    name: "規程済み"
    description: "組織全体で行っている。"

  - level: 4
    name: "測定済みおよび管理済み"
    description: "基準に基づいて管理される。"

  - level: 5
    name: "最適化済み"
    description: "継続的に改善している。"

topicAreas:
  - topic: "データ管理 – 戦略とガバナンス"
    description: |-
      - 機関の目標をサポートするデータ戦略を策定する
      - データイニシアチブに優先順位をつけたロードマップを可視化する
      - データガバナンス組織構造を定義する
      - データガバナンスの実践を定義する
      - データスチュワードとデータカストディアン(データ運用管理責任者)の役割と責任が確立されていることを確認する
      - データ管理の実践を監督するためのデータガバナンスプログラムフレームワークと憲章を定義する

  - topic: "データ管理 – アーキテクチャ"
    description: |-
      - "機関のデータニーズを特定し、データアーキテクチャの現状と目標とする状態を決定する"
      - "機関の現在のデータ要件と長期的なデータ要件を満たすための構造と計画を設計する"
      - "機関が新興技術を活用して製品、サービス、データを迅速に進化させるための戦略的準備を整える"

  - topic: "データ管理 – 運用"
    description: |-
      - "データ管理活動を監督するための適切な体制とリソースを機関が確保していることを確認する"
      - "運用目標と戦略目標の達成を支援する機関全体のデータ管理プログラムを確立する"

  - topic: "データ管理 – リスク"
    description: |-
      - "リスク管理活動は、ビジネス成果を制限するのではなく、その達成を支援することを目的として実施される"
      - "機関のデータ資産への適切なアクセスのみを確保する"
      - "すべてのデータプライバシーおよび保護に関する規制とポリシーを理解し、遵守する"
      - "データリスクを監査および監視するためのプロトコルを確立する"

  - topic: "データ管理 – データ品質管理"
    description: |-
      - "データ品質を向上させるためのガバナンス体制の整備する"
      - "データ品質管理の基準の定義する"
      - "データ品質の状態を測定、監視、報告するためのプロセスの定義と実装する"

  - topic: "データ管理 – マスタデータ管理と参照データ管理"
    description: |-
      - "マスターデータ資産のガバナンスを改善する"
      - "機関内各部門がアクセスするマスターデータを単一ソースに統合する"

  - topic: "データ管理 – メタデータ管理"
    description: |-
      - "ビジネス用語と使用方法を理解する"
      - "メタデータにアクセスするための標準的な方法を提供する"
      - "メタデータの品質、一貫性、最新性、セキュリティを確保する"

  - topic: "データ管理 – 統合"
    description: |-
      - "アプリケーション間および機関全体のデータ共有を文書化し、監視する"
      - "データストア、アプリケーション、組織内およびそれら間でのデータの移動と統合のためのプロセスを確立する"

  - topic: "データ分析"
    description: |-
      - "機関は、セルフサービスまたは集中管理されたチームを通じて、既存のBI機能を理解し、活用している"
      - "BIおよび分析リクエストを管理するためのフレームワークを確立している"
      - "機関は大規模なデータを使用している"

assessments:
  - id: 1
    topic: "データ管理 – 戦略とガバナンス"
    summary: "情報に基づいた意思決定をサポートするために組織が必要とするデータとプロセスは、戦略レベル、戦術レベル、運用レベルで理解されている。"
    levels:
      0: "情報に基づいた意思決定をサポートするために組織が必要とするデータとプロセスを検討したり理解したりしている人は、組織内でほとんどいない。"
      1: "政府組織が戦術的、戦略的、または運用レベルで情報に基づいた意思決定を行うために必要なデータとプロセスは、場合によっては組織の一部で理解されている。"
      2: "組織が戦術、戦略、運用の各レベルで情報に基づいた意思決定を行うために必要なデータとプロセスは、組織内のデータに重点を置く部門では理解されているが、それ以外の部門では理解されていない。上級管理職（最高データ責任者（CDO）または同等の役職）が組織全体のデータに責任と説明責任を負う。"
      3: "戦術、戦略、運用の各レベルにおける情報に基づいた意思決定を支援するために組織が必要とするデータとプロセスは、組織全体で認識され、部分的には十分に理解されている。幹部は、データ分野に影響を与える意思決定を行う際に、これらのニーズを考慮する。上級リーダー（CDOまたは同等の役職者）は、組織全体のデータに対して責任と説明責任を負う。"
      4: "戦術、戦略、運用の各レベルにおける情報に基づいた意思決定を支援するために組織が必要とするデータとプロセスは、組織全体で十分に理解されている。幹部は、あらゆる意思決定を行う際にこれらのニーズを考慮する。組織のCDO（または同等の役職）は、関連する組織の計画立案と意思決定に関与している。"
      5: "戦術、戦略、運用の各レベルにおける情報に基づいた意思決定を支援するために組織が必要とするデータとプロセスは、組織全体で定期的に評価され、十分に理解されている。幹部は、あらゆる意思決定を行う際に、これらのニーズを積極的に考慮する。組織のCDO（または同等の役職者）は、組織の計画策定と意思決定について協議し、関与する。"

  - id: 2
    topic: "データ管理 – 戦略とガバナンス"
    summary: "組織には、データの収集、保存、共有、使用に関するビジョンと優先順位をまとめたデータ戦略が策定されている。"
    levels:
      0: "組織にはデータ戦略が整備されていない。"
      1: "組織は、組織の特定の部門における活動の指針となるデータ戦略の開発に取り組んでいる、または開発済みである。"
      2: "組織の特定部門における活動の指針となるデータ戦略を発表し、その実施を開始している。"
      3: "組織は、組織全体の行動と意思決定を支援するためのデータ戦略を発表し、実施した。この戦略は、組織全体および一部の外部ステークホルダーとの協議を経て策定された。"
      4: "組織全体にわたる行動と意思決定の根拠となる、成熟したデータ戦略を策定している。パートナー組織はこれらの戦略を積極的に参照し、経営幹部の意思決定プロセスにも組み込まれている。また、これらの戦略は定期的に更新されている。"
      5: "当組織は、組織全体にわたる行動と意思決定の根拠となる、成熟したデータ戦略を策定している。組織のパートナーはこれらの戦略を積極的に参照し、経営幹部の意思決定プロセスにも組み込まれている。これらの戦略は、変化する組織のニーズに合わせて定期的に見直し、更新されている。"

  - id: 3
    topic: "データ管理 – 戦略とガバナンス"
    summary: "組織のデータ管理業務の計画は、組織のビジョンとニーズの評価に基づいて策定される。"
    levels:
      0: "組織は正式なデータ管理業務を一切行っていない。"
      1: "組織のデータ管理業務の計画は、組織のより広範なビジョンとニーズに関する知識に基づいて行われるが、データ管理業務とそれらのビジョンおよびニーズの間には直接的なつながりが限られている。"
      2: "組織のデータ管理業務の計画は、組織のより広範なビジョンとニーズに基づいて行われるが、主に組織の事業分野に焦点を当てている。"
      3: "組織のデータ管理業務の計画では、組織のほとんどの領域へのリンクを含め、組織のより広範なビジョンとニーズとのつながりを考慮して計画している。"
      4: "組織のデータ管理業務の計画は組織計画の一部とみなされ、データ管理業務と組織のすべての領域にわたる組織のより広範なビジョンの間には直接的なつながりがある。"
      5: "組織のデータ管理業務の計画は、組織全体の計画およびニーズの更新と変更に連動している。組織全体のニーズの変化は積極的に監視され、データ管理業務に反映している。"

  - id: 4
    topic: "データ管理 – 戦略とガバナンス"
    summary: "組織には、業務効率をサポートし、サービス提供の革新をサポートし、慎重なリスク管理を概説するデータ管理戦略がある。"
    levels:
      0: "組織にはデータ管理戦略がない。"
      1: "組織はデータ管理戦略の策定に取り組んでいる、または策定済みである。"
      2: "組織はデータ管理戦略を策定しており、その準備段階では組織内の関連するデータ重視の領域に相談した。"
      3: "組織は、3 つの領域すべてと関連データをサポートするデータ管理戦略を策定しており、その準備段階では組織内のデータに重点を置かない領域とも協議が行われた。"
      4: "組織は、3 つの領域すべてと関連データをサポートする包括的なデータ管理戦略を策定しており、その準備段階では組織内のデータに重点を置かない領域や外部の利害関係者に相談した。"
      5: "これら3つの領域すべてを支える包括的なデータ管理戦略を策定した。この戦略は、組織内のあらゆる部門および外部の利害関係者との協議を通じて定期的に評価され、必要に応じて更新され、目的に合致した状態が維持される。"

  - id: 5
    topic: "データ管理 – 戦略とガバナンス"
    summary: "組織には、戦略レベルでデータ資産の管理を監督するためのガバナンス機能が備わっている。"
    levels:
      0: "組織は、戦略レベルでデータ資産の管理を監督するためのデータガバナンスを実装するための措置を講じていない。"
      1: "組織は、組織内の一部の領域におけるデータ資産の管理を監督するため、データガバナンスの導入に向けた初期段階の措置を講じた。しかし、ガバナンス体制はサイロ化されており、組織間の可視性は限られている。"
      2: "組織は、組織内の「データ集約型」領域におけるデータ資産の管理を監督するデータガバナンスグループを設置している。このグループは組織内の他の領域とも連携しているが、審議には関与していない。データガバナンス以外のグループへの関与は計画中または検討中である。"
      3: "組織のデータガバナンスグループは、組織のほぼすべての分野の代表者で構成され、組織の経営幹部レベルのガバナンスエコシステムに組み込まれている。データガバナンスグループの決定は、必要に応じて関連する幹部メンバーにエスカレーションされ、検討される。"
      4: "組織のデータガバナンスグループは、組織のほぼすべての分野から代表者で構成され、組織の経営幹部レベルのガバナンスエコシステムに組み込まれている。データガバナンスグループのメンバー構成は、随時更新される。幹部は、データガバナンスグループに影響を与える問題を積極的に検討する。"
      5: "組織のデータガバナンスグループは、組織内の関連分野すべてから代表者を擁し、組織の経営幹部レベルのガバナンス・エコシステムにおいて、積極的に活動し、権限を与えられた一員である。データガバナンスグループのメンバーシップは、ビジネスニーズに基づいて頻繁に検討される。幹部および執行委員会の関連サブグループは、データガバナンスグループに影響を与える問題を積極的に検討する。"

  - id: 6
    topic: "データ管理 – 戦略とガバナンス"
    summary: "組織では、ビジネス運営の意思決定におけるデータの使用を奨励し、監督するための慣行が実施されている（例：ポリシーまたはサービス提供の結果のサポート）。"
    levels:
      0: "組織には、事業運営上の意思決定におけるデータの使用を奨励し、監督するための慣行が整っていない。"
      1: "組織がビジネス運営の意思決定を行うためにデータを使用することは、組織の一部で奨励され、監督されている。"
      2: "業務運営上の意思決定におけるデータ活用は、組織内のデータ重視の領域においては奨励・監督されているが、それ以外の領域においては行われていない。上級管理職は、業務運営上の意思決定におけるデータ活用を組織全体で監視する責任と説明責任を負っている。"
      3: "業務運営上の意思決定におけるデータ活用は、組織全体で奨励・監督されており、一部では十分に理解されている。上級管理職（CDOまたは同等の役職）は、業務運営上の意思決定におけるデータ活用を組織全体で促進・監督する責任と説明責任を負っている。"
      4: "業務運営上の意思決定におけるデータ活用は、組織全体で十分に理解され、奨励されている。上級管理職は、業務運営上の意思決定におけるデータ活用を奨励し、監督する責任と説明責任を負っている。"
      5: "業務運営上の意思決定におけるデータ活用は、組織全体で積極的に奨励され、定期的に評価され、十分に理解されている。上級管理職は、業務運営上の意思決定におけるデータ活用の促進、監督、改善に責任と説明責任を負っている。"

  - id: 7
    topic: "データ管理 – 戦略とガバナンス"
    summary: "組織では、幹部 および大臣に質の高いアドバイス (新しい政策提案など) を提供するにあたり、データの使用を奨励および監督するための慣行が実施されている。"
    levels:
      0: "組織には、幹部 および大臣に助言を提供する際のデータの使用を奨励および監督するための慣行が整っていない。"
      1: "組織が 幹部 および大臣に助言を提供する際にデータを使用することは、組織の一部で奨励され、監督されている。"
      2: "組織が幹部および大臣に助言を行う際にデータを利用することは、組織内のデータに重点を置く部門において奨励され、監督されている。上級管理職は、幹部への助言を行うための意思決定における組織全体のデータ利用状況を監視する責任と説明責任を負う。"
      3: "幹部および大臣への助言におけるデータ活用は、組織全体で奨励・監督されており、一部は十分に理解されている。上級管理職（CDOまたは同等の役職）は、幹部への助言に関する意思決定におけるデータ活用を組織全体で奨励・監督する責任と説明責任を負う。"
      4: "政府組織が幹部および大臣に助言を行うためにデータを利用することは、組織全体で十分に理解され、奨励されている。上級管理職は、幹部への助言を行うための意思決定におけるデータ利用を奨励し、監督する責任と説明責任を負う。"
      5: "幹部および大臣への助言提供におけるデータ活用は、組織全体で積極的に奨励され、定期的に評価され、十分に理解されている。上級管理職は、幹部への助言提供に関する意思決定におけるデータ活用を奨励、監督、改善する責任と説明責任を負う。"

  - id: 8
    topic: "データ管理 – 戦略とガバナンス"
    summary: "組織では、組織レベルでの運用要件（予算の最も効率的な配分方法、人員計画など）を満たすためにデータの使用を奨励および監督するための慣行が実施されている。"
    levels:
      0: "組織には、組織レベルでの運用要件を満たすためのデータの使用を奨励し、監督するための慣行が整っていない。"
      1: "組織レベルでの業務要件を満たすために組織がデータを使用することは、組織の一部で奨励され、監督されている。"
      2: "組織レベルの業務要件を満たすためのデータ活用は、組織内のデータに重点を置く部門において奨励され、監督されている。上級管理職は、組織レベルの業務要件に関する意思決定のために、組織全体のデータ活用状況を監視する責任と説明責任を負う。"
      3: "組織レベルの業務要件を満たすための組織のデータ活用は、組織全体で奨励・監督されており、一部は十分に理解されている。上級管理職（CDOまたは同等の役職）は、組織レベルの業務要件に関する意思決定において、組織全体でデータ活用を奨励・監督する責任と説明責任を負う。"
