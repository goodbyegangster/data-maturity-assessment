      3: "組織は、幹部のデータに関する説明責任の原則のほとんどまたはすべてを組織内に浸透させており、これらの原則は組織全体に広く理解されている。上級リーダー（CDOまたは同等の役職者）は、幹部のデータに関する説明責任の原則の浸透、促進、および実施の監督に責任を負う。"
